name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate manifest version
        run: |
          node -e "const tag=process.env.GITHUB_REF_NAME.replace(/^v/,''); const pkg=require('./package.json'); const manifest=require('./manifest.json'); if (pkg.version !== tag || manifest.version !== tag) { throw new Error('Version mismatch: tag=' + tag + ', package=' + pkg.version + ', manifest=' + manifest.version); }"

      - name: Package plugin
        run: |
          mkdir -p release
          cp manifest.json main.js styles.css release/
          cd release
          zip -r ../memos-companion-${GITHUB_REF_NAME}.zip manifest.json main.js styles.css

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            manifest.json
            main.js
            styles.css
            memos-companion-${{ github.ref_name }}.zip
          generate_release_notes: true
